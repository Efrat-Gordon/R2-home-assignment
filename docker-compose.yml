services:
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: r2
      POSTGRES_PASSWORD: r2
      POSTGRES_DB: r2
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U r2"]
      interval: 5s
      timeout: 5s
      retries: 5
  gateway:
    depends_on:
      - web
      - be
    image: nginx:latest
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - 8080:8080
  web:
    build: ./web
    image: r2-web
  be:
    build: ./be-low-level
    image: r2-be-low-level
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://r2:r2@db:5432/r2
      REDIS_URL: redis://redis:6379